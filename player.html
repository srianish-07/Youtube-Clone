<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube | Video</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #f9f9f9;
            padding: 30px;
        }

        .container {
            max-width: 800px;
        }

        iframe {
            width: 100%;
            height: 420px;
            border: none;
            border-radius: 10px;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-top: 15px;
            line-height: 1.4;
        }

        .info {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .profile {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .channel {
            font-size: 16px;
            font-weight: 600;
        }

        .views {
            font-size: 14px;
            color: gray;
            margin-top: 3px;
        }

        .three-lines-button,
        .profile-pic {
            border-radius: 50%;
        }

        .three-lines-button:hover,
        .profile-pic:hover {
            filter: brightness(0.85);
        }

        .home,
        .three-lines-button,
        .search-image,
        .profile-pic {
            width: auto;
            cursor: pointer;
            height: 45px;
        }

        .home {
            margin-left: 10px;
        }

        .nav-bar-div {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .home,
        .three-lines-button,
        .search-image,
        .profile-pic {
            height: 45px;
            cursor: pointer;
        }

        .search-div {
            display: flex;
            align-items: center;
            flex: 4;
            max-width: 500px;
        }

        .input-box {
            height: 40px;
            width: 100%;
            border: 1px solid black;
            border-radius: 20px;
            font-size: 16px;
            padding-left: 10px;
        }

        .search-image {
            height: 30px;
            margin-left: 10px;
        }

        .profile-div {
            margin-left: auto;
        }
    </style>
</head>

    <div class="container">
        <iframe id="video"></iframe>
        <div class="title" id="title"></div>
        <div class="info">
            <img id="profile" class="profile">
            <div>
                <div class="channel" id="channel"></div>
                <div class="views" id="views"></div>
            </div>
        </div>
    </div>

    <script>

        const data = JSON.parse(localStorage.getItem("video"));

        document.getElementById("video").src = data.url;
        document.getElementById("title").innerText = data.title;
        document.getElementById("channel").innerText = data.channel;
        document.getElementById("profile").src = data.profile;
        document.getElementById("views").innerText = data.views;
    </script>
